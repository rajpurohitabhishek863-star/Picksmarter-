<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | PickSmarter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#07111f;
color:white;
}

header{
background:#0d1c33;
padding:20px;
text-align:center;
}

header h1{
color:#4ea1ff;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.contact-card{
background:#101d34;
padding:35px;
border-radius:15px;
margin-bottom:25px;
}

h2{
color:#4ea1ff;
margin-bottom:15px;
}

p{
line-height:1.8;
color:#d6deea;
}

form{
margin-top:20px;
}

input,
textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#182846;
color:white;
}

button{
background:#4ea1ff;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

footer{
background:#050c17;
text-align:center;
padding:30px;
margin-top:50px;
}

a{
color:#4ea1ff;
text-decoration:none;
}

</style>

</head>
<body>

<header>
<h1>Contact PickSmarter</h1>
</header>

<div class="container">

<div class="contact-card">
<h2>Get In Touch</h2>

<p>
Have questions, suggestions, business inquiries, or partnership opportunities?
Feel free to contact us.
</p>

<br>

<p>
📧 Email:
<a href="mailto:picksmarter30@gmail.com">
picksmarter30@gmail.com
</a>
</p>

</div>

<div class="contact-card">

<h2>Send Us A Message</h2>

<form action="https://formspree.io/f/meewyaoj" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="6" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

<footer>
<p>© 2026 PickSmarter. All Rights Reserved.</p>
</footer>

</body>
</html>
